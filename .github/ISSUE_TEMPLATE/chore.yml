name: Chore / Docs
description: Repo configuration, tooling, or documentation work.
title: "chore(<scope>): <short summary>"
labels: ["type: chore"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What this issue covers and why.
    validations:
      required: true
  - type: textarea
    id: dod
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
    validations:
      required: true
  - type: input
    id: design_ref
    attributes:
      label: DESIGN.md reference (optional)
    validations:
      required: false
